<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa Tela Inteira</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([-16.68088, -49.25327], 5);
        // Curitiba como posição inicial

        L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}',
            {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }
        ).addTo(map);

        L.marker([-25.4284, -49.2733])
            .addTo(map)
            .bindPopup('Curitiba')
            .openPopup();

        const curitiba = [-25.4284, -49.2733];
        const cascavel = [-24.9555, -53.4552];

        L.polyline(
            [curitiba, cascavel],
            {
                color: 'red',
                weight: 8,
                opacity: 0.85
            }
        ).addTo(map);
    </script>

</body>

</html>
