<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciador de Comércio</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="titlebar">
    <div class="title">
      Gerenciador de Mercado - Tibia
    </div>

    <div class="window-controls">
      <button id="settingsBtn" class="window-btn settings-btn">⚙</button>
      <button id="minimize-btn" class="window-btn">─</button>
      <button id="close-btn" class="window-btn close">✕</button>
    </div>
  </div>
  <div class="app">

    <nav class="navbar">
      <div class="nav-info" id="totalProfit">Ganho Total: 00,00</div>
      <div class="nav-info" id="monthlyProfit">Ganho Mensal: 0,00</div>
      <div class="nav-info" id="dailyProfit">Ganho Diário: 0,00</div>
    </nav>

    <section class="carousel-section">
      <div class="section-title">Servidores</div>

      <div class="carousel" id="serverCarousel"></div>
    </section>

    <div class="search-bar">
      <input type="text" id="itemSearchInput" placeholder="Pesquisar item..." autocomplete="off" />

      <div id="itemSearchDropdown" class="search-dropdown"></div>
    </div>

    <section class="order-form collapsed" id="orderFormSection">
      <div class="section-title collapsible-title" id="orderFormToggle">
        Criar Ordem
        <div class="itemvenal" id="itemVenal"></div>
        <span class="toggle-icon">▼</span>
      </div>

      <div class="order-form-content" id="orderFormContent">
        <div class="form-grid">
          <div class="form-input-wrapper">
            <input type="text" id="itemName" placeholder="Nome do item" autocomplete="off" />
            <div id="createItemDropdown" class="search-dropdown"></div>
          </div>
          <input type="number" id="itemQuantity" placeholder="Quantidade" />
          <input type="number" id="itemValue" placeholder="Valor" />
          <button id="createOrderBtn">Criar</button>
        </div>
      </div>
    </section>

    <section class="orders-section">
      <div class="section-title">Ordens Criadas</div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Servidor</th>
              <th>Item</th>
              <th>Qtd</th>
              <th>Valor</th>
              <th>Lucro</th>
              <th id="statusHeader" class="status-filter active">
                Status
              </th>
              <th>Ação</th>

            </tr>
          </thead>

          <tbody id="ordersTable">
            <tr>
              <td>Auroria</td>
              <td>Exemplo Item</td>
              <td>100</td>
              <td>25.000</td>
              <td>5.000</td>
              <td>0,02</td>
              <td class="status">Ativa</td>
              <td><button class="delete-btn">Excluir</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <div id="executeOrderModal" class="modal-overlay hidden">
    <div class="execute-modal-box">
      <button id="closeExecuteModalBtn" class="modal-close-btn">✕</button>

      <h3 id="executeModalItemName">Nome do item</h3>

      <input type="number" id="executeQuantityInput" placeholder="Quantidade comprada" />

      <button id="confirmExecuteOrderBtn">OK</button>
    </div>
  </div>

  <div id="settingsModal" class="modal-overlay hidden">
    <div class="settings-modal-box">
      <button id="closeSettingsModalBtn" class="modal-close-btn">✕</button>

      <h3>Configurações</h3>

      <div class="settings-row">
        <label>Servidor</label>
        <strong id="settingsServerName">Auroria</strong>
      </div>

      <div class="settings-row">
        <label>Valor da coin em gold</label>
        <span id="currentGoldCoinValue">0</span>

        <input type="number" id="goldCoinInput" placeholder="Novo valor" />
        <button id="updateGoldCoinBtn">Atualizar</button>
      </div>

      <div class="settings-row">
        <label>Valor em R$ de 1000 coins</label>
        <span id="currentBRL250CoinsValue">0,00</span>

        <input type="number" id="brl250CoinsInput" placeholder="Novo valor" />
        <button id="updateBRL250CoinsBtn">Atualizar</button>
      </div>
    </div>
  </div>


  <script src="./js/backend.js" type="module"></script>
  <script src="./js/app.js" type="module"></script>
</body>

</html>
